<div class="directory-container">

  <header class="directory-header">
    <div class="header-title">
      <h1>Salary Management</h1>
    </div>

    <div class="header-actions">
      <button pButton type="button" label="Update Payroll" icon="pi pi-sync"
        class="p-button-secondary"></button>
    </div>
  </header>

  <div class="salary-layout">

    <aside class="salary-form-panel">

      <div class="panel-header">
        <h3>Create Salary Entry</h3>
        <p class="panel-subtitle">Add a new compensation record</p>
      </div>

      <form #f="ngForm" (ngSubmit)="createSalary(f)" class="form-container">

        <div class="form-group">
          <label>EMPLOYEE</label>
          <select name="employeeId" ngModel required>
            <option value="">Select employee...</option>
            <option *ngFor="let employee of (employees$ | async)" [value]="employee.id">
                 {{ employee.fullName }} - {{ employee.department }} - {{ employee.employeeNumber }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>RATE</label>
          <input type="number" name="rate" ngModel placeholder="e.g. 5000" required />
        </div>

        <div class="form-group">
          <label>REQUIRED HOURS</label>
          <input type="number" name="requiredHours" ngModel required />
        </div>

        <div class="form-group">
          <label>POLICY</label>
          <select name="policy" ngModel required>
            <option value="">Select policy...</option>
            <option *ngFor="let p of policies" [value]="p.value">
              {{ p.label }}
            </option>
          </select>
        </div>

        <div class="form-actions">
          <button pButton type="button" label="Clear"
            class="btn-clear p-button-text"
            (click)="f.reset()"></button>
            
          <button pButton type="submit" label="Save Salary"
            icon="pi pi-check" class="btn-save"></button>
        </div>

      </form>

    </aside>

    <section class="salary-table-panel">

      <p-table
        [value]="(salaries$ | async) ?? []"
        responsiveLayout="scroll"
        styleClass="directory-table"
      >

        <ng-template pTemplate="header">
          <tr>
            <th style="width: 40%">EMPLOYEE</th>
            <th style="width: 15%">EMP NO</th>
            <th style="width: 15%" class="text-right">RATE</th>
            <th style="width: 15%" class="text-right">HOURS</th>
            <th style="width: 15%">POLICY</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-salary>
          <tr>

            <td>
              <div class="employee-profile">
                <div class="avatar">
                  <img *ngIf="salary.profilePicture"
                       [src]="salary.profilePicture" />

                  <span *ngIf="!salary.profilePicture">
                    {{ getInitials(salary.fullName) }}
                  </span>
                </div>

                <div class="info">
                  <span class="name">{{ salary.fullName }}</span>
                </div>
              </div>
            </td>

            <td>{{ salary.employeeNumber }}</td>

            <td class="text-right font-semibold">₱{{ salary.rate | number:'1.2-2' }}</td>

            <td class="text-right">{{ salary.requiredHours }}</td>

            <td>{{ salary.policy }}</td>

          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="text-center table-empty-state">No salary records found.</td>
          </tr>
        </ng-template>

      </p-table>

    </section>

  </div>
</div>
