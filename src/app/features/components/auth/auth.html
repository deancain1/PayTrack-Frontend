<button
  pButton
  type="submit"
  icon="pi pi-sign-in"
  label="Login"
  class="btn-submit"
></button>

<div class="divider">
  <span>OR</span>
</div>

<button
  pButton
  type="button"
  class="google-btn"
  (click)="signInWithGoogle()"
>
  <img
    src="https://developers.google.com/identity/images/g-logo.png"
    alt="Google"
    class="google-icon"
  />

  <span>Continue with Google</span>
</button>
